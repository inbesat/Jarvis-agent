<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS // Memory Core</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--cyan:#00ffcc;--magenta:#ff0066;--dark:#06080d;--panel:rgba(8,12,20,0.92);--border:rgba(0,255,204,0.12);--glow:0 0 20px rgba(0,255,204,0.15);--green:#00e676;--red:#ff1744;--yellow:#ffd600}
body{font-family:'JetBrains Mono',monospace;background:var(--dark);color:#c8d6e5;display:flex;height:100vh;overflow:hidden}
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.scanline{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,204,0.008) 2px,rgba(0,255,204,0.008) 4px)}

.sidebar{width:260px;background:var(--panel);backdrop-filter:blur(20px);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:1;position:relative}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
.logo{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;color:var(--cyan);letter-spacing:3px}
.logo-sub{font-size:8px;color:rgba(0,255,204,0.35);letter-spacing:3px;margin-top:2px}
.logo-status{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:9px;color:rgba(0,255,204,0.4)}
.logo-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.3}}

.nav-section{padding:6px 0;border-bottom:1px solid var(--border)}
.nav-item{padding:10px 16px;cursor:pointer;font-size:11px;letter-spacing:1px;text-transform:uppercase;transition:all .2s;display:flex;align-items:center;gap:8px;color:rgba(200,214,229,0.5);border-left:2px solid transparent}
.nav-item:hover{color:var(--cyan);background:rgba(0,255,204,0.04)}
.nav-item.active{color:var(--cyan);border-left-color:var(--cyan);background:rgba(0,255,204,0.06)}
.nav-item .icon{font-size:14px;width:20px;text-align:center}
.nav-item .count{margin-left:auto;font-size:9px;background:rgba(0,255,204,0.1);padding:2px 6px;border-radius:8px;color:rgba(0,255,204,0.5)}

.search-box{padding:10px 16px;border-bottom:1px solid var(--border)}
.search-box input{width:100%;padding:7px 10px;background:rgba(0,255,204,0.03);border:1px solid var(--border);border-radius:3px;color:var(--cyan);font-family:'JetBrains Mono',monospace;font-size:10px;outline:none}
.search-box input:focus{border-color:var(--cyan)}
.search-box input::placeholder{color:rgba(0,255,204,0.2)}

.main{flex:1;display:flex;flex-direction:column;z-index:1;position:relative}
.main-header{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--panel);backdrop-filter:blur(20px)}
.main-header h3{flex:1;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:500;color:var(--cyan);letter-spacing:2px;text-transform:uppercase}

.btn{padding:7px 12px;border:none;border-radius:3px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;transition:all .2s}
.btn-primary{background:rgba(0,255,204,0.15);color:var(--cyan);border:1px solid rgba(0,255,204,0.3)}
.btn-primary:hover{background:rgba(0,255,204,0.25);box-shadow:0 0 15px rgba(0,255,204,0.15)}
.btn-danger{background:rgba(255,0,102,0.1);color:var(--magenta);border:1px solid rgba(255,0,102,0.2)}
.btn-danger:hover{background:rgba(255,0,102,0.2)}
.btn-ghost{background:transparent;color:rgba(0,255,204,0.4);border:1px solid rgba(0,255,204,0.1)}
.btn-ghost:hover{color:var(--cyan);border-color:rgba(0,255,204,0.3)}
.btn-sm{padding:4px 8px;font-size:9px}

.content-area{flex:1;overflow-y:auto;padding:20px 24px}
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;color:rgba(0,255,204,0.2);font-size:12px;flex-direction:column;gap:10px}
.empty-state .icon{font-family:'Orbitron',sans-serif;font-size:48px;font-weight:700;color:rgba(0,255,204,0.06)}

.card{background:rgba(0,255,204,0.03);border:1px solid rgba(0,255,204,0.08);border-radius:4px;padding:14px;margin-bottom:8px;transition:all .2s;position:relative}
.card:hover{border-color:rgba(0,255,204,0.2);background:rgba(0,255,204,0.05)}
.card-title{font-size:12px;font-weight:600;color:var(--cyan);margin-bottom:4px}
.card-content{font-size:11px;color:rgba(200,214,229,0.6);line-height:1.5;white-space:pre-wrap}
.card-meta{font-size:9px;color:rgba(0,255,204,0.25);margin-top:6px;letter-spacing:0.5px}
.card-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity .2s}
.card:hover .card-actions{opacity:1}
.card-actions button{padding:3px 6px;font-size:8px;background:rgba(0,255,204,0.08);color:rgba(0,255,204,0.5);border:1px solid rgba(0,255,204,0.1);border-radius:2px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .2s}
.card-actions button:hover{background:rgba(0,255,204,0.15);color:var(--cyan)}

.chat-msg{max-width:80%;padding:10px 14px;border-radius:4px;font-size:11px;line-height:1.5;margin-bottom:6px;position:relative}
.chat-msg.user{align-self:flex-end;background:rgba(0,255,204,0.06);border:1px solid rgba(0,255,204,0.12);color:#b8f0e0}
.chat-msg.assistant{align-self:flex-start;background:rgba(255,0,102,0.04);border:1px solid rgba(255,0,102,0.08);color:#e0d0d8}
.chat-msg .role{font-size:8px;letter-spacing:2px;font-weight:600;margin-bottom:3px;color:rgba(0,255,204,0.4)}
.chat-msg.assistant .role{color:rgba(255,0,102,0.4)}
.chat-msg .time{font-size:8px;color:rgba(200,214,229,0.15);margin-top:4px}
.chat-msg .msg-actions{display:none;position:absolute;top:4px;right:4px;gap:3px}
.chat-msg:hover .msg-actions{display:flex}
.msg-actions button{padding:2px 5px;font-size:8px;background:rgba(255,0,102,0.1);color:rgba(255,0,102,0.5);border:1px solid rgba(255,0,102,0.15);border-radius:2px;cursor:pointer;font-family:'JetBrains Mono',monospace}

.todo-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid rgba(0,255,204,0.08);border-radius:4px;margin-bottom:4px;transition:all .3s;position:relative}
.todo-item.status-pending{background:rgba(0,255,204,0.03);border-left:3px solid rgba(0,255,204,0.3)}
.todo-item.status-done{background:rgba(0,230,118,0.06);border-left:3px solid var(--green)}
.todo-item.status-failed{background:rgba(255,23,68,0.06);border-left:3px solid var(--red)}
.todo-item:hover{border-color:rgba(0,255,204,0.2)}

.todo-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;cursor:pointer;transition:all .3s;border:2px solid}
.todo-item.status-pending .todo-icon{border-color:rgba(0,255,204,0.3);color:rgba(0,255,204,0.4);background:rgba(0,255,204,0.05)}
.todo-item.status-pending .todo-icon:hover{border-color:var(--green);color:var(--green);background:rgba(0,230,118,0.1)}
.todo-item.status-done .todo-icon{border-color:var(--green);color:var(--green);background:rgba(0,230,118,0.15)}
.todo-item.status-failed .todo-icon{border-color:var(--red);color:var(--red);background:rgba(255,23,68,0.15)}

.todo-text{font-size:11px;flex:1;transition:all .3s}
.todo-item.status-done .todo-text{color:rgba(0,230,118,0.6);text-decoration:line-through}
.todo-item.status-failed .todo-text{color:rgba(255,23,68,0.6);text-decoration:line-through}
.todo-item.status-pending .todo-text{color:rgba(200,214,229,0.8)}

.todo-actions{display:flex;gap:4px;opacity:0;transition:opacity .2s}
.todo-item:hover .todo-actions{opacity:1}
.todo-actions button{padding:3px 6px;font-size:8px;border-radius:2px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .2s;border:1px solid}
.todo-actions .act-done{background:rgba(0,230,118,0.08);color:rgba(0,230,118,0.6);border-color:rgba(0,230,118,0.15)}
.todo-actions .act-done:hover{background:rgba(0,230,118,0.2);color:var(--green)}
.todo-actions .act-fail{background:rgba(255,23,68,0.08);color:rgba(255,23,68,0.6);border-color:rgba(255,23,68,0.15)}
.todo-actions .act-fail:hover{background:rgba(255,23,68,0.2);color:var(--red)}
.todo-actions .act-edit{background:rgba(0,255,204,0.08);color:rgba(0,255,204,0.5);border-color:rgba(0,255,204,0.1)}
.todo-actions .act-edit:hover{background:rgba(0,255,204,0.15);color:var(--cyan)}
.todo-actions .act-del{background:rgba(255,0,102,0.08);color:rgba(255,0,102,0.5);border-color:rgba(255,0,102,0.1)}
.todo-actions .act-del:hover{background:rgba(255,0,102,0.2);color:var(--magenta)}

.priority-high{border-left:3px solid var(--magenta) !important}
.priority-medium{border-left:3px solid var(--yellow) !important}
.priority-low{border-left:3px solid var(--cyan) !important}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(6,8,13,0.85);backdrop-filter:blur(8px);z-index:100;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:24px;width:400px;max-width:90vw;box-shadow:var(--glow)}
.modal h3{font-family:'Orbitron',sans-serif;color:var(--cyan);margin-bottom:14px;font-size:11px;letter-spacing:2px;text-transform:uppercase}
.modal input,.modal textarea,.modal select{width:100%;padding:10px;background:rgba(0,255,204,0.03);border:1px solid var(--border);border-radius:3px;color:var(--cyan);font-family:'JetBrains Mono',monospace;font-size:11px;margin-bottom:10px;outline:none}
.modal input:focus,.modal textarea:focus{border-color:var(--cyan)}
.modal textarea{min-height:80px;resize:vertical}
.modal select option{background:var(--dark);color:var(--cyan)}
.modal-actions{display:flex;gap:6px;justify-content:flex-end}

.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:4px;font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:0.5px;z-index:200;transform:translateY(100px);opacity:0;transition:all .3s ease;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:rgba(0,230,118,0.15);border:1px solid rgba(0,230,118,0.3);color:var(--green)}
.toast.error{background:rgba(255,23,68,0.15);border:1px solid rgba(255,23,68,0.3);color:var(--red)}
.toast.info{background:rgba(0,255,204,0.1);border:1px solid rgba(0,255,204,0.2);color:var(--cyan)}

.auto-badge{font-size:8px;padding:2px 6px;border-radius:8px;background:rgba(0,230,118,0.1);color:rgba(0,230,118,0.5);letter-spacing:0.5px;display:flex;align-items:center;gap:4px}
.auto-badge .dot{width:4px;height:4px;border-radius:50%;background:var(--green);animation:pulse-dot 2s infinite}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,255,204,0.15);border-radius:2px}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="scanline"></div>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo">JARVIS</div>
    <div class="logo-sub">MEMORY CORE v4.0</div>
    <div class="logo-status"><span class="dot"></span> Auto-refresh ON</div>
  </div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search all sections..." oninput="filterItems()">
  </div>
  <div class="nav-section" id="navSection">
    <div class="nav-item active" data-section="chat_history" onclick="switchSection('chat_history')">
      <span class="icon">&#x1F4AC;</span>Chat History<span class="count" id="count_chat_history">0</span>
    </div>
    <div class="nav-item" data-section="notes" onclick="switchSection('notes')">
      <span class="icon">&#x1F4DD;</span>Notes<span class="count" id="count_notes">0</span>
    </div>
    <div class="nav-item" data-section="future_ideas" onclick="switchSection('future_ideas')">
      <span class="icon">&#x1F4A1;</span>Future Ideas<span class="count" id="count_future_ideas">0</span>
    </div>
    <div class="nav-item" data-section="todo_list" onclick="switchSection('todo_list')">
      <span class="icon">&#x2611;</span>Todo List<span class="count" id="count_todo_list">0</span>
    </div>
    <div class="nav-item" data-section="tasks" onclick="switchSection('tasks')">
      <span class="icon">&#x1F4CB;</span>Tasks<span class="count" id="count_tasks">0</span>
    </div>
  </div>
</div>

<div class="main">
  <div class="main-header">
    <h3 id="sectionTitle">Chat History</h3>
    <div class="auto-badge"><span class="dot"></span>LIVE</div>
    <button class="btn btn-primary btn-sm" id="addBtn" onclick="showAddModal()">+ Add</button>
    <button class="btn btn-ghost btn-sm" id="importBtn" onclick="importTxt()">Import Log</button>
  </div>
  <div class="content-area" id="contentArea">
    <div class="empty-state"><div class="icon">J</div><div>Select a section to begin</div></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Add Item</h3>
    <div id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modalSaveBtn" onclick="saveModalItem()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
let currentSection = 'chat_history';
let allData = {};
let editingId = null;
let searchQuery = '';
let refreshTimer = null;
let lastDataHash = '';

const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
function resizeBg(){bgCanvas.width=window.innerWidth;bgCanvas.height=window.innerHeight}
resizeBg();window.addEventListener('resize',resizeBg);
const stars=[];for(let i=0;i<60;i++)stars.push({x:Math.random()*2000,y:Math.random()*1200,s:Math.random()*1.2+0.3,dx:(Math.random()-0.5)*0.2,dy:(Math.random()-0.5)*0.1,o:Math.random()});
function drawBg(){bgCtx.fillStyle='rgba(6,8,13,0.12)';bgCtx.fillRect(0,0,bgCanvas.width,bgCanvas.height);
for(const s of stars){s.x+=s.dx;s.y+=s.dy;s.o+=Math.random()*0.01-0.005;if(s.x<0)s.x=bgCanvas.width;if(s.x>bgCanvas.width)s.x=0;if(s.y<0)s.y=bgCanvas.height;if(s.y>bgCanvas.height)s.y=0;
bgCtx.beginPath();bgCtx.arc(s.x,s.y,s.s,0,Math.PI*2);bgCtx.fillStyle=`rgba(0,255,204,${Math.max(0,Math.min(1,s.o))*0.25})`;bgCtx.fill()}
requestAnimationFrame(drawBg)}drawBg();

function toast(msg, type='info'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+type+' show';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),3000);
}

function hashData(d){return JSON.stringify(d)}

async function loadAll(showToast){
  const oldHash=lastDataHash;
  for(const section of ['chat_history','notes','future_ideas','todo_list','tasks']){
    try{const res=await fetch(API+'/api/'+section);allData[section]=await res.json()}
    catch(e){allData[section]=[]}
    document.getElementById('count_'+section).textContent=allData[section].length;
  }
  lastDataHash=hashData(allData);
  if(showToast && oldHash && oldHash!==lastDataHash){
    toast('Memory updated','info');
  }
  renderSection();
}

function switchSection(section){
  currentSection=section;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.section===section));
  const titles={chat_history:'Chat History',notes:'Notes',future_ideas:'Future Ideas',todo_list:'Todo List',tasks:'Tasks'};
  document.getElementById('sectionTitle').textContent=titles[section]||section;
  document.getElementById('addBtn').style.display=section==='chat_history'?'none':'';
  document.getElementById('importBtn').style.display=section==='chat_history'?'':'none';
  renderSection();
}

function filterItems(){
  searchQuery=document.getElementById('searchInput').value.toLowerCase().trim();
  renderSection();
}

function getFiltered(items){
  if(!searchQuery)return items;
  return items.filter(item=>{
    const text=JSON.stringify(item).toLowerCase();
    return text.includes(searchQuery);
  });
}

function renderSection(){
  const area=document.getElementById('contentArea');
  let items=getFiltered(allData[currentSection]||[]);
  if(!(allData[currentSection]||[]).length){
    area.innerHTML='<div class="empty-state"><div class="icon">{</div><div>No items yet. Click "+ Add" to create one.</div></div>';
    return;
  }
  if(!items.length){
    area.innerHTML='<div class="empty-state"><div class="icon">?</div><div>No matches for "'+esc(searchQuery)+'"</div></div>';
    return;
  }

  if(currentSection==='chat_history'){
    area.innerHTML=items.map(m=>`<div class="chat-msg ${m.role}"><div class="role">${m.role==='user'?'YOU':'JARVIS'}</div><div>${esc(m.content)}</div><div class="time">${m.timestamp||''}</div><div class="msg-actions"><button onclick="deleteItem('${m.id}')">Del</button></div></div>`).join('');
    area.scrollTop=area.scrollHeight;
  } else if(currentSection==='todo_list'){
    area.innerHTML=items.map(t=>{
      const st=t.status||'pending';
      const icon=st==='done'?'&#x2713;':st==='failed'?'&#x2717;':'&#x25CB;';
      return `<div class="todo-item status-${st}"><div class="todo-icon" onclick="cycleTodoStatus('${t.id}','${st}')">${icon}</div><div class="todo-text">${esc(t.text)}</div><div class="todo-actions"><button class="act-done" onclick="event.stopPropagation();setTodoStatus('${t.id}','done')" title="Mark done">&#x2713;</button><button class="act-fail" onclick="event.stopPropagation();setTodoStatus('${t.id}','failed')" title="Mark failed">&#x2717;</button><button class="act-edit" onclick="event.stopPropagation();editTodo('${t.id}')" title="Edit">&#x270E;</button><button class="act-del" onclick="event.stopPropagation();deleteItem('${t.id}')" title="Delete">&#x1F5D1;</button></div></div>`;
    }).join('');
  } else if(currentSection==='notes'||currentSection==='future_ideas'||currentSection==='tasks'){
    area.innerHTML=items.map(item=>{
      const priorityClass=item.priority?'priority-'+item.priority:'';
      const title=item.title||item.text||'Untitled';
      const content=item.content||item.description||'';
      const statusBadge=item.status?`<span style="font-size:9px;padding:2px 6px;border-radius:8px;background:rgba(0,255,204,0.1);color:rgba(0,255,204,0.5)">${item.status}</span>`:'';
      return `<div class="card ${priorityClass}"><div class="card-title">${esc(title)} ${statusBadge}</div><div class="card-content">${esc(content)}</div><div class="card-meta">${item.created||''}</div><div class="card-actions"><button onclick="editItem('${item.id}')">Edit</button><button onclick="deleteItem('${item.id}')">Del</button></div></div>`;
    }).join('');
  }
}

function cycleTodoStatus(id, currentStatus){
  const next={pending:'done',done:'failed',failed:'pending'};
  setTodoStatus(id, next[currentStatus]||'pending');
}

async function setTodoStatus(id, status){
  const item=(allData.todo_list||[]).find(x=>x.id===id);
  if(!item)return;
  await fetch(API+'/api/todo_list/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:item.text,status:status})});
  const labels={done:'Task completed',failed:'Task marked failed',pending:'Task reset'};
  toast(labels[status]||'Updated', status==='done'?'success':status==='failed'?'error':'info');
  await loadAll();
}

function showAddModal(){
  editingId=null;
  const modal=document.getElementById('modalOverlay');
  const body=document.getElementById('modalBody');
  const title=document.getElementById('modalTitle');
  
  if(currentSection==='notes'){
    title.textContent='Add Note';
    body.innerHTML='<input id="mTitle" placeholder="Title"><textarea id="mContent" placeholder="Content..."></textarea>';
  } else if(currentSection==='future_ideas'){
    title.textContent='Add Future Idea';
    body.innerHTML='<input id="mTitle" placeholder="Title"><textarea id="mContent" placeholder="Description..."></textarea><select id="mPriority"><option value="low">Low Priority</option><option value="medium" selected>Medium Priority</option><option value="high">High Priority</option></select>';
  } else if(currentSection==='todo_list'){
    title.textContent='Add Todo';
    body.innerHTML='<input id="mContent" placeholder="What needs to be done?">';
  } else if(currentSection==='tasks'){
    title.textContent='Add Task';
    body.innerHTML='<input id="mTitle" placeholder="Task title"><textarea id="mContent" placeholder="Description..."></textarea><select id="mStatus"><option value="pending">Pending</option><option value="in_progress">In Progress</option><option value="completed">Completed</option></select><select id="mPriority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select>';
  }
  modal.classList.add('active');
}

function editItem(id){
  editingId=id;
  const item=(allData[currentSection]||[]).find(x=>x.id===id);
  if(!item)return;
  const modal=document.getElementById('modalOverlay');
  const body=document.getElementById('modalBody');
  const title=document.getElementById('modalTitle');
  
  if(currentSection==='notes'){
    title.textContent='Edit Note';
    body.innerHTML=`<input id="mTitle" placeholder="Title" value="${esc(item.title||'')}"><textarea id="mContent" placeholder="Content...">${esc(item.content||'')}</textarea>`;
  } else if(currentSection==='future_ideas'){
    title.textContent='Edit Idea';
    body.innerHTML=`<input id="mTitle" placeholder="Title" value="${esc(item.title||'')}"><textarea id="mContent" placeholder="Description...">${esc(item.content||'')}</textarea><select id="mPriority"><option value="low" ${item.priority==='low'?'selected':''}>Low</option><option value="medium" ${item.priority==='medium'?'selected':''}>Medium</option><option value="high" ${item.priority==='high'?'selected':''}>High</option></select>`;
  } else if(currentSection==='todo_list'){
    title.textContent='Edit Todo';
    body.innerHTML=`<input id="mContent" placeholder="Todo" value="${esc(item.text||'')}">`;
  } else if(currentSection==='tasks'){
    title.textContent='Edit Task';
    body.innerHTML=`<input id="mTitle" placeholder="Title" value="${esc(item.title||'')}"><textarea id="mContent" placeholder="Description...">${esc(item.description||'')}</textarea><select id="mStatus"><option value="pending" ${item.status==='pending'?'selected':''}>Pending</option><option value="in_progress" ${item.status==='in_progress'?'selected':''}>In Progress</option><option value="completed" ${item.status==='completed'?'selected':''}>Completed</option></select><select id="mPriority"><option value="low" ${item.priority==='low'?'selected':''}>Low</option><option value="medium" ${item.priority==='medium'?'selected':''}>Medium</option><option value="high" ${item.priority==='high'?'selected':''}>High</option></select>`;
  }
  modal.classList.add('active');
}

function editTodo(id){editItem(id)}

async function saveModalItem(){
  const payload={};
  const titleEl=document.getElementById('mTitle');
  const contentEl=document.getElementById('mContent');
  const priorityEl=document.getElementById('mPriority');
  const statusEl=document.getElementById('mStatus');
  
  if(titleEl)payload.title=titleEl.value;
  if(contentEl)payload.content=contentEl.value;
  if(currentSection==='todo_list')payload.text=contentEl?contentEl.value:'';
  if(priorityEl)payload.priority=priorityEl.value;
  if(statusEl)payload.status=statusEl.value;
  
  if(editingId){
    await fetch(API+'/api/'+currentSection+'/'+editingId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    toast('Item updated','success');
  } else {
    await fetch(API+'/api/'+currentSection,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    toast('Item added','success');
  }
  closeModal();
  await loadAll();
}

async function deleteItem(id){
  if(!confirm('Delete this item?'))return;
  await fetch(API+'/api/'+currentSection+'/'+id,{method:'DELETE'});
  toast('Item deleted','error');
  await loadAll();
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('active');editingId=null}

async function importTxt(){
  if(!confirm('Import jarvis_chat_log.txt into Chat History?'))return;
  const res=await fetch(API+'/api/import_txt',{method:'POST'});
  const data=await res.json();
  if(data.ok){toast('Imported '+data.imported+' messages','success');await loadAll()}else{toast('Import failed: '+(data.error||'Unknown'),'error')}
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if(e.ctrlKey&&e.key==='n'){e.preventDefault();showAddModal()}
});

loadAll();
refreshTimer=setInterval(()=>loadAll(true),3000);
</script>
</body>
